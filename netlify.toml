[build]
  publish = "."
  command = ""

# Imágenes y assets: en dev Vite las sirve desde public/ en la raíz,
# en Netlify están en /public/. Este redirect las reubica automáticamente.
[[redirects]]
  from = "/*"
  to = "/public/:splat"
  status = 200
  force = false

[[headers]]
  for = "/app/*.jsx"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "no-cache"

[[headers]]
  for = "/app/*.js"
  [headers.values]
    Cache-Control = "no-cache"
